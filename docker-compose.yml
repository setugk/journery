services:
  clipboard:
    build: .
    container_name: clipboard
    restart: unless-stopped
    ports:
      - "5050:5000"
    volumes:
      - ./data:/data
    environment:
      - CLIPPERY_USER=admin
      - CLIPPERY_PASS=changeme
      - CLIPPERY_MAX=25   # default history limit; overridable from the UI
